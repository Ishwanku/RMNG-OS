id: swarm-coordinator
layer: L4
description: >-
  High-level orchestrator — decomposes tasks and delegates to L3/L2/L1
  specialists. Emits plan.only or hands off execution; never runs tools directly.
skills:
  - phase-gates
allowed_native_tools: []
allowed_mcp_tools: []
delegates_to:
  - research-curator
  - repo-keeper
  - kernel-engineer
  - system-health
  - runtime-executor
# Fast model for L4 orchestration (override global [llm] via named profile)
llm_profile: groq-fast
# If Groq rate-limits, try these profiles in order (Sprint 8)
llm_fallback:
  - grok-frontier
  - local-ollama
