id: repo-keeper
layer: L3
description: >-
  Repository hygiene specialist — git status, diffs, PR context, read-only
  memory recall, sandbox test workflows, and output validation on summaries.
skills:
  - git-workflow
  - github-workflow
  - memory-management
  - self-critique
  - output-validation
  - improvement-loop
  - code-execution
  - regression-check
  - test-coverage-check
  - validate-output
  - run-tests
allowed_native_tools:
  - git.status
  - git.diff
  - github.pr_status
allowed_mcp_tools:
  - git:git.log
  - git:git.diff
  - git:git.status
  - mem0:search_memories
  - mem0:get_memory
  - e2b:run_code
delegates_to: []
daily_budget_usd: 1.75